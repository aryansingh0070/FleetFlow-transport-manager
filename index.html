<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FleetFlow is a premium transport management dashboard built by Aryan Singh Sikarwar."
    />
    <meta name="theme-color" content="#111917" />
    <title>FleetFlow Transport Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Main navigation">
        <div class="brand">
          <div class="brand-mark">FF</div>
          <div>
            <strong>FleetFlow</strong>
            <span>Transport Manager</span>
          </div>
        </div>

        <nav class="nav-list" id="navList"></nav>

        <div class="sidebar-footer">
          <div class="sync-state">
            <span class="status-dot"></span>
            <span>Local data saved</span>
          </div>
          <strong>Made by Aryan Singh Sikarwar</strong>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Operations Workspace</p>
            <h1 id="pageTitle">Dashboard</h1>
          </div>

          <div class="topbar-actions">
            <div class="creator-chip">Made by Aryan Singh Sikarwar</div>
            <label class="field compact">
              <span>Role</span>
              <select id="roleSelect">
                <option value="owner">Owner</option>
                <option value="accountant">Accountant</option>
                <option value="dispatcher">Dispatcher</option>
                <option value="driver">Driver</option>
              </select>
            </label>
            <button class="icon-button" id="exportJsonBtn" title="Export backup" aria-label="Export backup">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3v12m0 0 4-4m-4 4-4-4" />
                <path d="M5 20h14" />
              </svg>
            </button>
            <button class="primary-button" data-view="trips" data-focus-form="tripForm">New Trip</button>
          </div>
        </header>

        <section class="search-strip" aria-label="Global search and filters">
          <label class="search-box">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="m20 20-4-4"></path>
            </svg>
            <input id="globalSearch" type="search" placeholder="Search vehicle, driver, route, expense..." />
          </label>
          <div class="quick-stats" id="quickStats"></div>
        </section>

        <section id="appView" class="view" aria-live="polite"></section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
